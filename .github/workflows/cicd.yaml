name: CI/CD Innovatech EKS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  # Repositorios en Amazon ECR (Nombres configurados en AWS)
  ECR_REPO_FRONTEND: front-despacho
  ECR_REPO_BACKEND_VENTAS: backend-ventas
  ECR_REPO_BACKEND_DESPACHOS: backend-despachos
  ECR_REPO_DB: mysql-db

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- FRONTEND ----------
      - name: Crear repositorio ECR si no existe
        run: |
          aws ecr create-repository --repository-name front-despacho || true

      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd app-k8s/front-despacho
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}

      # ---------- BACKEND VENTAS ----------
      - name: Crear repositorio ECR Ventas si no existe
        run: |
          aws ecr create-repository --repository-name backend-ventas || true

      - name: Build & push BACKEND VENTAS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd app-k8s/back-ventas-springboot/api-rest-ventas
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG}

      # ---------- BACKEND DESPACHOS ----------
      - name: Crear repositorio ECR Despachos si no existe
        run: |
          aws ecr create-repository --repository-name backend-despachos || true

      - name: Build & push BACKEND DESPACHOS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd app-k8s/back-despachos-springboot/api-rest-despacho
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHOS}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHOS}:${IMAGE_TAG}

      # ---------- DB (MYSQL IMAGE) ----------
      #- name: Build & push DB
      #  env:
      #    ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      #  run: |
      #    cd app-k8s/db
      #    docker build -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} .
      #    docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}


      # ---------- Instalar kubectl ----------
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      # ---------- Configurar kubeconfig de EKS ----------
      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      # ---------- Aplicar manifests base ----------
      - name: Aplicar manifests base (namespace, DB, secretos y servicios)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f app-k8s/k8s/namespace.yaml
          kubectl apply -f app-k8s/k8s/mysql-secret.yaml -n $EKS_NAMESPACE
          kubectl apply -f app-k8s/k8s/mysql-service.yaml -n $EKS_NAMESPACE
          kubectl apply -f app-k8s/k8s/mysql-deployment.yaml -n $EKS_NAMESPACE

      # ---------- Actualizar BACKEND VENTAS en EKS ----------
      - name: Actualizar BACKEND VENTAS en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f app-k8s/k8s/backend-ventas-service.yaml -n $EKS_NAMESPACE
          kubectl apply -f app-k8s/k8s/backend-ventas-deployment.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/backend-ventas \
            backend-ventas=$ECR_REGISTRY/${ECR_REPO_BACKEND_VENTAS}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/backend-ventas -n $EKS_NAMESPACE

      # ---------- Actualizar BACKEND DESPACHOS en EKS ----------
      - name: Actualizar BACKEND DESPACHOS en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f app-k8s/k8s/backend-despachos-service.yaml -n $EKS_NAMESPACE
          kubectl apply -f app-k8s/k8s/backend-despachos-deployment.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/backend-despachos \
            backend-despachos=$ECR_REGISTRY/${ECR_REPO_BACKEND_DESPACHOS}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/backend-despachos -n $EKS_NAMESPACE

      # ---------- Actualizar FRONTEND en EKS ----------
      - name: Actualizar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f app-k8s/k8s/front-service.yaml -n $EKS_NAMESPACE
          kubectl apply -f app-k8s/k8s/front-deployment.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/front-despacho \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/front-despacho -n $EKS_NAMESPACE

      # ---------- Horizontal Pod Autoscaler (HPA) ----------
      - name: Aplicar HPA unificado
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          if [ -f app-k8s/k8s/hpa.yaml ]; then 
            kubectl apply -f app-k8s/k8s/hpa.yaml -n $EKS_NAMESPACE
          fi

      # ---------- Ver estado final ----------
      - name: Ver pods, servicios y HPA
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE || true