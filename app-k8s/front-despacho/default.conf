server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # SPA / frontend estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el backend de Ventas
    location /api/v1/ventas {
        proxy_pass http://backend-ventas-service:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy hacia el backend de Despachos
    location /api/v1/despachos {
        proxy_pass http://backend-despachos-service:8081;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}